<!doctype html>
<html lang="es-MX">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Energía · MX — Inteligencia editorial del sector energético</title>
<meta name="description" content="Inteligencia editorial sobre el sector energético, en español. Datos en vivo del Sistema Eléctrico Nacional, análisis, política, mapa, geotermia y noticias."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --paper:#F5F0E8; --paper-2:#EAE3D7; --line:#CFC4B1; --warm:#7E7158;
  --ink:#241F19; --ink-soft:#43392D; --taupe:#5B4F3B; --amber:#B07E1C; --amber-deep:#7A560F;
  --teal:#33564B; --blue:#27496B;
  --serif:"Playfair Display", Georgia, "Times New Roman", serif;
  --read:"Newsreader", Georgia, serif;
  --sans:-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --mono:"SFMono-Regular", ui-monospace, "Courier New", monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5;cursor:auto}
a{color:inherit;text-decoration:none}
.wrap{max-width:1240px;margin:0 auto;padding:0 40px}
.mono{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
.serif{font-family:var(--serif)}
.amber{color:var(--amber)}
.up{color:var(--teal)} .down{color:var(--blue)} .bad{color:#9a4a2c}

/* ---------- NAV ---------- */
header.nav{position:fixed;top:0;left:0;right:0;z-index:50;transition:background .3s,border-color .3s}
header.nav .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
.brand{font-family:var(--serif);font-size:22px;font-weight:700;display:flex;align-items:baseline;gap:8px}
.brand small{font-family:var(--mono);font-size:10px;letter-spacing:.2em;opacity:.7;transform:translateY(-3px)}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a{font-size:13.5px;color:var(--ink-soft);transition:color .15s;position:relative}
.nav-links a:hover{color:var(--ink)}
.nav-links a.active{color:var(--ink)}
.nav-links a.active::after{content:"";position:absolute;left:0;right:0;bottom:-6px;height:2px;background:var(--amber)}
.nav-right{display:flex;gap:18px;align-items:center}
.lang{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--ink-soft)}
.btn{display:inline-block;border:1px solid var(--ink);padding:9px 16px;font-size:12.5px;letter-spacing:.04em;background:transparent;cursor:pointer;transition:.15s;font-family:var(--sans)}
.btn:hover{background:var(--ink);color:var(--paper)}
.btn-amber{border-color:var(--amber-deep);background:var(--amber);color:#2A2723}
.btn-amber:hover{background:var(--amber-deep);color:var(--paper)}
/* transparent over hero (home top) */
body.home header.nav.attop .nav-links a,body.home header.nav.attop .brand,body.home header.nav.attop .lang{color:#f3ece1}
body.home header.nav.attop .nav-links a.active{color:#fff}
body.home header.nav.attop .btn{border-color:rgba(243,236,225,.7);color:#f3ece1}
body.home header.nav.attop .btn:hover{background:#f3ece1;color:var(--ink)}
/* solid */
header.nav.solid{background:rgba(245,240,232,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}

/* ---------- HERO ---------- */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;color:#f3ece1;overflow:hidden}
.hero-photo{position:absolute;inset:0;z-index:-2;
  background-image:url('assets/hero.jpg');background-size:cover;background-position:center 60%;
  filter:blur(3px) brightness(.45) saturate(1.05);transform:scale(1.08)}
.hero-fallback{position:absolute;inset:0;z-index:-3;
  background:radial-gradient(120% 90% at 75% 95%, rgba(214,150,60,.55), rgba(120,70,40,.25) 35%, rgba(20,16,22,0) 60%),
   linear-gradient(180deg,#2b2535,#3a2f3a 30%,#5a3f33 62%,#7c5230 80%,#b87a3a 100%)}
.hero-overlay{position:absolute;inset:0;z-index:-1;
  background:linear-gradient(180deg, rgba(18,14,18,.62), rgba(18,14,18,.32) 42%, rgba(18,14,18,.72))}
.hero .wrap{position:relative;z-index:1;width:100%}
.hero h1{font-family:var(--serif);font-weight:700;font-size:clamp(25px,2.9vw,44px);line-height:1.1;letter-spacing:-.01em;max-width:none;text-shadow:0 2px 26px rgba(0,0,0,.55)}
.hero h1 .accent{font-weight:600}
.hero h1 .accent{font-style:italic}
.hero .sub{font-family:var(--read);font-style:italic;font-size:clamp(17px,1.6vw,22px);margin-top:28px;max-width:46ch;color:#ece3d5;text-shadow:0 1px 16px rgba(0,0,0,.4)}
.hero-cta{display:flex;gap:34px;margin-top:40px;flex-wrap:wrap}
.hero-cta a{font-size:15px;border-bottom:1px solid rgba(243,236,225,.55);padding-bottom:5px;display:inline-flex;gap:10px;align-items:center}
.hero-cta a:hover{border-color:var(--amber)}
.hero-cta a.solid{border:1px solid rgba(243,236,225,.6);padding:11px 20px}
.hero-cta a.solid:hover{background:#f3ece1;color:var(--ink);border-color:#f3ece1}
.hero-foot{position:absolute;bottom:24px;left:0;right:0;z-index:1}
.hero-foot .wrap{display:flex;justify-content:space-between;align-items:center;opacity:.8}

/* ---------- INNER PAGE HEADER ---------- */
.page-top{padding:130px 0 8px}
.page-top .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--taupe)}
.page-top h1{font-family:var(--serif);font-weight:500;font-size:clamp(34px,4.6vw,60px);line-height:1.04;margin-top:12px;letter-spacing:-.01em}
.page-top .lede{font-family:var(--read);font-size:19px;color:var(--ink-soft);max-width:62ch;margin-top:18px}

/* ---------- SECTION SHELL ---------- */
section.block{padding:80px 0;border-top:1px solid var(--line)}
section.block.first{border-top:0}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--taupe)}
.sec-head{display:flex;justify-content:space-between;align-items:flex-end;gap:40px;flex-wrap:wrap}
.sec-title{font-family:var(--serif);font-weight:500;font-size:clamp(30px,3.6vw,50px);line-height:1.05;letter-spacing:-.01em;margin-top:12px}
.sec-meta{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--ink-soft);display:flex;align-items:center;gap:10px}
.sec-meta .live{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 0 rgba(94,124,115,.6);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(94,124,115,.5)}70%{box-shadow:0 0 0 7px rgba(94,124,115,0)}100%{box-shadow:0 0 0 0 rgba(94,124,115,0)}}
.lede{font-family:var(--read);font-size:18px;color:var(--ink-soft);max-width:60ch;margin-top:18px}
.link-amber{color:var(--amber-deep);border-bottom:1px solid var(--amber);font-size:13.5px}

/* ---------- DATOS / SEN ---------- */
.sen-grid{display:grid;grid-template-columns:1.25fr 1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);margin-top:40px}
.cell{background:var(--paper);padding:26px 24px;min-height:172px;display:flex;flex-direction:column}
.cell .clabel{font-family:var(--mono);font-size:10.5px;letter-spacing:.13em;color:var(--taupe)}
.cell .big{font-family:var(--serif);font-weight:500;font-size:44px;line-height:1;margin-top:auto}
.cell .big .u{font-size:17px;color:var(--ink-soft);font-family:var(--sans);margin-left:6px}
.cell .delta{font-family:var(--mono);font-size:11px;letter-spacing:.05em;margin-top:10px}
.cell.donutcell{grid-row:span 2}
.donut-wrap{display:flex;gap:22px;align-items:center;margin-top:auto;margin-bottom:auto}
.legend{display:flex;flex-direction:column;gap:7px;font-size:12.5px;flex:1}
.legend .li{display:flex;align-items:center;gap:8px}
.legend .sw{width:10px;height:10px;border-radius:2px;flex:none}
.legend .pc{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.cap-strip{display:grid;grid-template-columns:200px 1fr;gap:30px;align-items:center;background:var(--paper);border:1px solid var(--line);border-top:0;padding:24px}
.cap-strip .big{font-family:var(--serif);font-size:44px;line-height:1}
.cap-strip .big .u{font-size:17px;color:var(--ink-soft);margin-left:6px}
.bars{display:flex;align-items:flex-end;gap:14px;height:84px}
.bars .bar{flex:1;position:relative;border-radius:3px 3px 0 0;min-height:4px}
.bars .bar span{position:absolute;bottom:-19px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:9.5px;color:var(--ink-soft)}
.sen-foot{display:flex;justify-content:space-between;align-items:center;margin-top:18px;flex-wrap:wrap;gap:12px}

/* ---------- CARDS (analisis) ---------- */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-top:40px}
.card{background:var(--paper);padding:23px 24px 26px;display:flex;flex-direction:column;min-height:240px;border-top:3px solid var(--accent,#CFC4B1)}
.agenda-ev{transition:padding-left .15s}
.card .top{display:flex;align-items:center;gap:10px}
.card .flag{font-size:22px}
.card .ct{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;color:var(--taupe)}
.card h3{font-family:var(--serif);font-weight:500;font-size:21px;line-height:1.18;margin-top:16px}
.card p{font-size:13.5px;color:var(--ink-soft);margin-top:10px}
.card .foot{margin-top:auto;display:flex;justify-content:space-between;align-items:center;padding-top:16px}
.card .date{font-family:var(--mono);font-size:10.5px;color:var(--warm)}

/* ---------- POLITICA ---------- */
.pol-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:48px;margin-top:40px;align-items:start}
.pol-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line)}
.pol-stats .s{background:var(--paper);padding:22px}
.pol-stats .s .v{font-family:var(--serif);font-size:32px}
.pol-stats .s .l{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;color:var(--taupe);margin-top:6px}
.doc{margin-top:24px;border:1px solid var(--ink);padding:18px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.doc .dt{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-soft)}
.pol-table .r{display:grid;grid-template-columns:42px 130px 1fr;gap:16px;padding:16px 0;border-top:1px solid var(--line);align-items:start}
.pol-table .r:first-child{border-top:0}
.pol-table .code{font-family:var(--mono);font-size:13px;font-weight:600}
.pol-table .cn{font-family:var(--serif);font-size:17px}
.pol-table .st{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--amber-deep);margin-top:3px}
.pol-table .nt{font-size:13px;color:var(--ink-soft)}

/* ---------- MAPA ---------- */
.map-head{display:flex;gap:10px;flex-wrap:wrap;margin-top:30px}
.chip{font-family:var(--mono);font-size:11px;letter-spacing:.06em;border:1px solid var(--line);padding:8px 13px;cursor:pointer;color:var(--ink-soft);background:var(--paper);transition:.15s}
.chip:hover{border-color:var(--taupe)}
.chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.map-grid{display:grid;grid-template-columns:1fr 320px;gap:1px;background:var(--line);border:1px solid var(--line);margin-top:18px}
#map{height:460px;background:var(--paper-2)}
.map-side{background:var(--paper);padding:24px;display:flex;flex-direction:column;gap:22px}
.top5 .row{display:flex;justify-content:space-between;padding:9px 0;border-top:1px solid var(--line);font-size:14px}
.top5 .row:first-child{border-top:0}
.top5 .row .v{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
.hl .ht{font-family:var(--serif);font-size:19px;margin-top:8px;line-height:1.2}
.hl p{font-size:13px;color:var(--ink-soft);margin-top:8px}

/* ---------- GEOTERMIA ---------- */
.geo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-top:40px}
.geo{background:var(--paper);padding:22px;display:flex;flex-direction:column;min-height:210px}
.geo .gn{font-family:var(--serif);font-size:22px}
.geo .gp{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--warm);margin-top:2px}
.geo .gt{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:var(--amber-deep);margin-top:14px}
.geo .gh{font-size:13px;color:var(--ink);margin-top:8px;line-height:1.35}
.geo .gm{margin-top:auto;padding-top:14px}
.geo .gm .mv{font-family:var(--serif);font-size:26px}
.geo .gm .ml{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;color:var(--taupe)}
.geo-quote{font-family:var(--serif);font-style:italic;font-size:clamp(22px,2.6vw,34px);line-height:1.3;max-width:30ch;margin:54px auto 0;text-align:center}
.geo-quote .attr{display:block;font-family:var(--mono);font-style:normal;font-size:11px;letter-spacing:.1em;color:var(--taupe);margin-top:20px}

/* ---------- CONVOCATORIA ---------- */
.conv{background:var(--ink);color:#f3ece1}
.conv .kicker{color:var(--amber)} .conv .sec-title{color:#f3ece1} .conv .lede{color:#ccc3b5}
.conv-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:48px;margin-top:34px;align-items:start}
.conv-dates{display:flex;gap:36px;margin-bottom:30px;flex-wrap:wrap}
.conv-dates .d .l{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;color:var(--amber)}
.conv-dates .d .v{font-family:var(--serif);font-size:24px;margin-top:6px}
.conv-ctas{display:flex;flex-direction:column;gap:12px;max-width:360px}
.conv-ctas a{display:flex;justify-content:space-between;border-bottom:1px solid rgba(243,236,225,.25);padding:12px 0;font-size:14px}
.conv-facts{border:1px solid rgba(243,236,225,.2)}
.conv-facts .f{display:flex;justify-content:space-between;padding:14px 18px;border-top:1px solid rgba(243,236,225,.13);font-size:13.5px}
.conv-facts .f:first-child{border-top:0}
.conv-facts .f .l{color:#bdb4a6} .conv-facts .f .v{font-family:var(--mono);font-size:12px}
.conv .contact{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:#bdb4a6;margin-top:24px;line-height:1.8}

/* ---------- AGENDA ---------- */
.agenda-ev{display:grid;grid-template-columns:96px 130px 1fr 200px 30px;gap:20px;align-items:center;padding:20px 0;border-top:1px solid var(--line)}
.agenda-ev .d{font-family:var(--serif);font-size:24px}
.agenda-ev .dow{font-family:var(--mono);font-size:10px;color:var(--warm);display:block;margin-top:2px}
.agenda-ev .ty{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--amber-deep)}
.agenda-ev .ti{font-size:15px;font-family:var(--read)}
.agenda-ev .pl{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.agenda-ev .ar{text-align:right;color:var(--taupe)}

/* ---------- NOTICIAS / BLOG ---------- */
.feat{display:grid;grid-template-columns:1.4fr 1fr;gap:0;border:1px solid var(--line);margin-top:40px;background:var(--paper)}
.feat .ph{background:linear-gradient(135deg,#3a2f3a,#7c5230);min-height:340px;position:relative}
.feat .ph .cat{position:absolute;top:18px;left:18px;font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:#f3ece1;border:1px solid rgba(243,236,225,.5);padding:5px 10px}
.feat .body{padding:38px;display:flex;flex-direction:column}
.feat .body h2{font-family:var(--serif);font-weight:500;font-size:clamp(24px,2.6vw,36px);line-height:1.1;margin-top:10px}
.feat .body p{font-family:var(--read);font-size:16px;color:var(--ink-soft);margin-top:16px}
.feat .meta{margin-top:auto;padding-top:22px;font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:var(--taupe)}
.post-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-top:0;margin-top:0}
.post{background:var(--paper);padding:26px 24px;display:flex;flex-direction:column;min-height:230px;cursor:pointer;transition:background .15s}
.post:hover{background:#fbf7f0}
.post .cat{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--amber-deep)}
.post h3{font-family:var(--serif);font-weight:500;font-size:20px;line-height:1.18;margin-top:14px}
.post p{font-size:13.5px;color:var(--ink-soft);margin-top:10px}
.post .meta{margin-top:auto;padding-top:18px;font-family:var(--mono);font-size:10.5px;color:var(--warm)}

/* ---------- ARTICLE ---------- */
.article{max-width:720px;margin:0 auto}
.article .cat{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--amber-deep)}
.article h1{font-family:var(--serif);font-weight:500;font-size:clamp(30px,4vw,48px);line-height:1.08;margin-top:14px;letter-spacing:-.01em}
.article .dek{font-family:var(--read);font-style:italic;font-size:21px;color:var(--ink-soft);margin-top:18px;line-height:1.4}
.article .ameta{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--taupe);margin-top:22px;padding-bottom:22px;border-bottom:1px solid var(--line)}
.article .cover{height:340px;background:linear-gradient(135deg,#3a2f3a,#7c5230);margin:30px 0;border:1px solid var(--line)}
.article .prose p{font-family:var(--read);font-size:18px;line-height:1.72;color:#332f2a;margin-top:22px}
.article .back{display:inline-block;margin-top:40px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--amber-deep)}

/* ---------- BOLETIN ---------- */
.boletin{text-align:center;padding:104px 0;background:var(--paper-2);border-top:1px solid var(--line)}
.boletin h2{font-family:var(--serif);font-weight:500;font-size:clamp(28px,3.4vw,44px);max-width:18ch;margin:14px auto 0;line-height:1.1}
.boletin form{display:flex;max-width:460px;margin:34px auto 0}
.boletin input{flex:1;border:1px solid var(--ink);border-right:0;background:transparent;padding:13px 16px;font-size:14px;font-family:var(--sans)}
.boletin .note{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--taupe);margin-top:18px}

/* ---------- FOOTER ---------- */
footer.site{background:var(--ink);color:#cfc6b8;padding:70px 0 40px}
.f-top{display:grid;grid-template-columns:1.6fr repeat(4,1fr);gap:36px}
.f-brand .fb{font-family:var(--serif);font-size:26px;color:#f3ece1}
.f-brand p{font-size:13px;margin-top:14px;max-width:34ch;line-height:1.6}
.f-col h4{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;color:var(--amber);margin-bottom:14px}
.f-col a{display:block;font-size:13.5px;padding:5px 0;color:#cfc6b8}
.f-col a:hover{color:#f3ece1}
.f-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:54px;padding-top:24px;border-top:1px solid rgba(243,236,225,.13);font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:#9a9182;flex-wrap:wrap;gap:12px}

@media(max-width:900px){
  .wrap{padding:0 22px}
  .nav-links{display:none}
  .sen-grid,.cards,.geo-grid,.post-grid{grid-template-columns:1fr 1fr}
  .cell.donutcell{grid-row:auto}
  .pol-grid,.conv-grid,.map-grid,.feat,.cap-strip{grid-template-columns:1fr}
  #map{height:320px}
  .agenda-ev{grid-template-columns:70px 1fr;gap:10px}
  .agenda-ev .ty,.agenda-ev .pl,.agenda-ev .ar{display:none}
  .f-top{grid-template-columns:1fr 1fr}
}

/* ---------- HOME: OVERVIEW DE SECCIONES ---------- */
.ov-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-top:40px}
.ov{background:var(--paper);padding:28px 24px;display:flex;flex-direction:column;min-height:190px;transition:background .15s}
.ov:hover{background:#fbf7f0}
.ov .num{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--amber-deep)}
.ov h3{font-family:var(--serif);font-weight:500;font-size:23px;margin-top:14px;color:var(--ink)}
.ov p{font-size:14px;color:var(--ink-soft);margin-top:10px;line-height:1.5}
.ov .go{margin-top:auto;padding-top:16px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--amber-deep)}

/* ---------- BANDA DE CONTENIDO / SUBHEAD ---------- */
.band{margin-top:40px;padding:34px 38px;background:var(--ink);border:0;border-left:4px solid var(--amber)}
.band .l{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--amber)}
.band p{font-family:var(--read);font-size:18px;color:#e7ddcd;margin-top:10px;max-width:70ch;line-height:1.6}
.subhead{font-family:var(--serif);font-size:26px;font-weight:500;margin-top:64px;color:var(--ink)}
.subhead+.sublede{font-size:15px;color:var(--ink-soft);margin-top:8px;max-width:62ch}

/* ---------- MINI-STATS (datos: combustibles) ---------- */
.ministats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-top:22px}
.ministats .m{background:var(--paper);padding:20px 22px}
.ministats .m .l{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--taupe)}
.ministats .m .v{font-family:var(--serif);font-size:30px;margin-top:10px}
.ministats .m .v .u{font-family:var(--sans);font-size:13px;color:var(--ink-soft);margin-left:5px}
.ministats .m .d{font-family:var(--mono);font-size:10.5px;margin-top:8px}

/* ---------- LISTAS (docs / proyectos / previas) ---------- */
.doclist .d,.previas .p{display:flex;justify-content:space-between;gap:20px;align-items:baseline;padding:18px 0;border-top:1px solid var(--line)}
.doclist .d:first-child,.previas .p:first-child{border-top:0}
.doclist .dt{font-family:var(--serif);font-size:18px}
.doclist .dr{font-family:var(--mono);font-size:11px;color:var(--ink-soft);white-space:nowrap}
.previas .py{font-family:var(--serif);font-size:24px;color:var(--amber-deep);min-width:70px}
.previas .px{font-size:14.5px;color:var(--ink-soft)}
.projlist{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-top:22px}
.projlist .pr{background:var(--paper);padding:18px 20px;display:flex;align-items:center;gap:14px}
.projlist .dot{width:11px;height:11px;border-radius:50%;flex:none}
.projlist .pn{font-family:var(--serif);font-size:18px}
.projlist .ps{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--taupe)}
.projlist .pv{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--ink)}
.crit{margin-top:22px}
.crit li{list-style:none;padding:13px 0 13px 26px;border-top:1px solid var(--line);position:relative;font-size:15px;color:var(--ink)}
.crit li:first-child{border-top:0}
.crit li::before{content:"→";position:absolute;left:0;color:var(--amber-deep)}
.faq .q{padding:20px 0;border-top:1px solid var(--line)}
.faq .q:first-child{border-top:0}
.faq .q h4{font-family:var(--serif);font-size:19px;font-weight:500}
.faq .q p{font-size:14.5px;color:var(--ink-soft);margin-top:8px;max-width:68ch}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-top:40px;align-items:start}
@media(max-width:900px){.ov-grid,.ministats,.projlist,.two-col{grid-template-columns:1fr}}

/* ===== COLOR & DINAMISMO ===== */
.block.alt{background:var(--paper-2)}
.block.dark{background:var(--ink);color:#cabfa9}
.block.dark .sec-title,.block.dark h2,.block.dark h3,.block.dark .geo-quote{color:#f4ede0}
.block.dark .lede,.block.dark p{color:#c6bca7}
.block.dark .kicker{color:var(--amber)}
.block.dark .geo-grid{background:rgba(243,236,225,.14);border-color:rgba(243,236,225,.14)}
.block.dark .geo{background:#2f2a23}
.block.dark .geo .gh{color:#e7ddcd}.block.dark .geo .gn,.block.dark .geo .gm .mv{color:#f4ede0}
.block.dark .link-amber{color:var(--amber)}
/* tick de color en cada kicker */
.kicker{display:flex;align-items:center;gap:9px}
.kicker::before{content:"";width:16px;height:2px;background:var(--amber);flex:none}
/* números de stats con color */
.pol-stats .s:nth-child(1) .v{color:var(--amber-deep)}
.pol-stats .s:nth-child(2) .v{color:var(--blue)}
.pol-stats .s:nth-child(3) .v{color:var(--teal)}
.pol-stats .s:nth-child(4) .v{color:#9a4a2c}
.cell .big,.cap-strip .big,.ministats .m .v{color:var(--ink)}
/* overview con ícono + barra de color superior */
.ov{border-top:3px solid var(--accent,#B07E1C)}
.ov .ic{color:var(--accent,#B07E1C);margin-bottom:4px}
.ov .ic svg{width:30px;height:30px;fill:none;stroke:currentColor;stroke-width:1.5}
.ov .num{color:var(--accent,#B07E1C)}
/* notas del blog con portada de color */
.post{padding:0;overflow:hidden}
.post .thumb{height:140px;display:flex;align-items:flex-end;padding:14px}
.post .thumb .cat{color:#fff;font-family:var(--mono);font-size:10px;letter-spacing:.1em;background:rgba(20,16,12,.32);padding:5px 9px}
.post .pbody{padding:22px 24px;display:flex;flex-direction:column;flex:1}
.post .pbody h3{margin-top:0}
.post .pbody .meta{color:var(--warm)}
/* panel de tendencia (mini-viz) */
.trend{border:1px solid var(--line);border-top:0;background:var(--paper);padding:22px 26px}
.trend .th{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.trend .tl{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;color:var(--taupe)}
.trend .tv{font-family:var(--serif);font-size:22px;color:var(--teal)}
.trend svg{width:100%;height:120px;display:block}
/* acentos varios */
.sec-meta .live{background:var(--teal)}
.feat .body .kicker.amber{color:var(--amber-deep)}
.cap-strip{border-top:0}
</style>
